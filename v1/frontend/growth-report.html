<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成长报告 - 专注力星球</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .report-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .report-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .report-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .report-date {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .overall-score {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .score-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .score-value {
            font-size: 4rem;
            font-weight: 700;
            color: white;
        }

        .score-label {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .ai-comment {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-left: 4px solid var(--primary);
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            line-height: 1.8;
            margin-top: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .chart-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .chart-title {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .recommendations {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .recommendation-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid var(--gray-100);
        }

        .recommendation-item:last-child {
            border-bottom: none;
        }

        .recommendation-type {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .no-data {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }

        .no-data-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1>📊 专注力星球</h1>
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>
    </header>

    <main class="container" style="padding-top: 40px; padding-bottom: 40px;">
        <div class="report-container">
            <div class="report-header">
                <h1>🎯 专注力成长报告</h1>
                <p class="report-date" id="report-date">加载中...</p>
            </div>

            <div id="loading-state" class="no-data">
                <div class="no-data-icon">⏳</div>
                <p>正在生成报告...</p>
            </div>

            <div id="report-content" class="hidden">
                <div class="overall-score">
                    <div class="score-circle">
                        <span id="overall-score" class="score-value">--</span>
                    </div>
                    <p class="score-label">综合专注力得分</p>
                    <div id="ai-comment" class="ai-comment"></div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">🎮</div>
                        <div id="total-games" class="stat-value">0</div>
                        <div class="stat-label">训练游戏次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📈</div>
                        <div id="avg-accuracy" class="stat-value">0%</div>
                        <div class="stat-label">平均正确率</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⭐</div>
                        <div id="avg-score" class="stat-value">0</div>
                        <div class="stat-label">平均得分</div>
                    </div>
                </div>

                <div class="chart-section">
                    <h2 class="chart-title">📊 训练趋势</h2>
                    <canvas id="trend-chart"></canvas>
                </div>

                <div class="recommendations">
                    <h2 class="chart-title">💡 成长建议</h2>
                    <div id="recommendations-list"></div>
                </div>
            </div>

            <div id="no-data-state" class="no-data hidden">
                <div class="no-data-icon">📝</div>
                <h2 style="margin-bottom: 15px;">暂无训练数据</h2>
                <p>开始你的专注力训练，生成专属成长报告！</p>
                <a href="index.html" class="btn btn-primary" style="margin-top: 20px; display: inline-block;">
                    开始训练
                </a>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2024-2026 专注力星球 - 科学的专注力训练</p>
        </div>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/growth-report.js"></script>
</body>
</html>
