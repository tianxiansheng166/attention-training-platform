<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双任务训练 - 专注力星球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1e1b4b;
            --darker: #0f0d24;
            --light: #e0e7ff;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 50%, #2e1065 100%);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, white, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, white, transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 230px 80px, white, transparent),
                radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 370px 200px, white, transparent),
                radial-gradient(2px 2px at 450px 50px, rgba(255,255,255,0.8), transparent);
            background-size: 500px 300px;
            animation: twinkle 8s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-info {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-box {
            background: rgba(99, 102, 241, 0.2);
            padding: 10px 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .stat-box .label {
            font-size: 0.75rem;
            color: var(--light);
            margin-bottom: 4px;
        }

        .stat-box .value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
        }

        .btn-back {
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-5px);
        }

        /* 难度选择 */
        .difficulty-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }

        .difficulty-section h2 {
            margin-bottom: 20px;
            color: var(--text);
        }

        .difficulty-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .diff-btn {
            background: rgba(99, 102, 241, 0.2);
            border: 2px solid var(--primary);
            color: var(--text);
            padding: 15px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            flex: 1;
            max-width: 200px;
        }

        .diff-btn:hover, .diff-btn.active {
            background: var(--primary);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .diff-btn .level {
            display: block;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .diff-btn .desc {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* 游戏区域 */
        .game-area {
            display: none;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
        }

        .game-area.active {
            display: block;
        }

        .progress-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.3s;
        }

        .task-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .task-card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .task-card.math {
            border-color: rgba(245, 158, 11, 0.5);
        }

        .task-card.shape {
            border-color: rgba(16, 185, 129, 0.5);
        }

        .task-card.current {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .task-card.math.current {
            border-color: var(--accent);
            background: rgba(245, 158, 11, 0.1);
        }

        .task-card.shape.current {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .task-title {
            font-size: 0.9rem;
            color: var(--light);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .math-problem {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .shape-display {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 120px;
            margin: 20px 0;
        }

        .shape {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .task-status {
            font-size: 0.85rem;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }

        .task-status.waiting {
            background: rgba(255,255,255,0.1);
            color: var(--light);
        }

        .task-status.active {
            background: var(--primary);
            color: white;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .answer-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .answer-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .answer-btn.correct {
            background: var(--success);
            color: white;
        }

        .answer-btn.wrong {
            background: var(--danger);
            color: white;
        }

        .answer-btn:hover {
            transform: scale(1.05);
        }

        .answer-btn:active {
            transform: scale(0.95);
        }

        /* 结果页面 */
        .result-section {
            display: none;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
        }

        .result-section.active {
            display: block;
        }

        .result-title {
            font-size: 2rem;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-stat {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
        }

        .result-stat .label {
            color: var(--light);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .result-stat .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }

        .result-stat.highlight .value {
            color: var(--success);
        }

        .result-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-retry {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back-menu {
            background: rgba(255,255,255,0.1);
            color: var(--text);
            border: none;
            padding: 15px 40px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-retry:hover, .btn-back-menu:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* 动画效果 */
        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .flash-correct {
            animation: flashCorrect 0.3s ease-out;
        }

        @keyframes flashCorrect {
            0% { background: rgba(16, 185, 129, 0.5); }
            100% { background: transparent; }
        }

        .flash-wrong {
            animation: flashWrong 0.3s ease-out;
        }

        @keyframes flashWrong {
            0% { background: rgba(239, 68, 68, 0.5); }
            100% { background: transparent; }
        }

        /* 帮助弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--dark);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            border: 2px solid var(--primary);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text);
            font-size: 2rem;
            cursor: pointer;
        }

        .modal-body ul {
            list-style: none;
            padding: 0;
        }

        .modal-body li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .modal-body li:last-child {
            border-bottom: none;
        }

        .help-icon {
            background: rgba(99, 102, 241, 0.2);
            padding: 5px 10px;
            border-radius: 8px;
            margin-right: 10px;
        }

        @media (max-width: 768px) {
            .task-container {
                grid-template-columns: 1fr;
            }
            
            .difficulty-buttons {
                flex-direction: column;
            }
            
            .diff-btn {
                max-width: none;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .math-problem {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    
    <div class="container">
        <header class="header">
            <h1>🚀 双任务训练</h1>
            <div class="header-info">
                <div class="stat-box">
                    <div class="label">正确数</div>
                    <div class="value" id="correctCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="label">连击</div>
                    <div class="value" id="streakCount">0</div>
                </div>
                <div class="stat-box">
                    <div class="label">剩余时间</div>
                    <div class="value" id="timeLeft">60</div>
                </div>
                <button class="btn-back" id="btnBack">← 返回</button>
            </div>
        </header>

        <!-- 难度选择页面 -->
        <section class="difficulty-section fade-in" id="menuScreen">
            <h2>🎯 选择训练难度</h2>
            <div class="difficulty-buttons">
                <button class="diff-btn" data-level="1">
                    <span class="level">⭐ 初级</span>
                    <span class="desc">5题 · 30秒</span>
                </button>
                <button class="diff-btn active" data-level="2">
                    <span class="level">⭐⭐ 中级</span>
                    <span class="desc">10题 · 60秒</span>
                </button>
                <button class="diff-btn" data-level="3">
                    <span class="level">⭐⭐⭐ 高级</span>
                    <span class="desc">15题 · 90秒</span>
                </button>
            </div>
            <div style="margin-top: 30px;">
                <button class="btn-retry" id="btnStart" style="padding: 18px 60px; font-size: 1.2rem;">
                    🚀 开始训练
                </button>
            </div>
            <div style="margin-top: 15px;">
                <button class="btn-back" id="btnHelp">❓ 游戏规则</button>
            </div>
        </section>

        <!-- 游戏进行页面 -->
        <section class="game-area" id="gameScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>

            <div class="task-container">
                <!-- 数学任务卡片 -->
                <div class="task-card math" id="mathCard">
                    <div class="task-title">
                        <span>🧮</span>
                        <span>数学计算</span>
                    </div>
                    <div class="math-problem" id="mathProblem">3 + 5 = ?</div>
                    <div class="task-status waiting" id="mathStatus">等待中...</div>
                    <div class="answer-buttons" id="mathButtons" style="display: none;">
                        <button class="answer-btn correct" id="btnMathCorrect">✓ 正确</button>
                        <button class="answer-btn wrong" id="btnMathWrong">✗ 错误</button>
                    </div>
                </div>

                <!-- 图形任务卡片 -->
                <div class="task-card shape" id="shapeCard">
                    <div class="task-title">
                        <span>🔷</span>
                        <span>图形识别</span>
                    </div>
                    <div class="shape-display">
                        <div class="shape" id="shapeDisplay">⬛</div>
                    </div>
                    <div class="task-status waiting" id="shapeStatus">等待中...</div>
                    <div class="answer-buttons" id="shapeButtons" style="display: none;">
                        <button class="answer-btn correct" id="btnShapeYes">✓ 是</button>
                        <button class="answer-btn wrong" id="btnShapeNo">✗ 不是</button>
                    </div>
                </div>
            </div>

            <div style="text-align: center; color: var(--light); font-size: 0.9rem;">
                💡 提示：按键盘 ← 左箭头 = 正确/是，→ 右箭头 = 错误/不是
            </div>
        </section>

        <!-- 结果页面 -->
        <section class="result-section" id="resultScreen">
            <h2 class="result-title">🎉 训练完成！</h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="label">总得分</div>
                    <div class="value" id="finalScore">0</div>
                </div>
                <div class="result-stat highlight">
                    <div class="label">正确率</div>
                    <div class="value" id="finalAccuracy">0%</div>
                </div>
                <div class="result-stat">
                    <div class="label">正确数</div>
                    <div class="value" id="finalCorrect">0</div>
                </div>
                <div class="result-stat">
                    <div class="label">最高连击</div>
                    <div class="value" id="finalStreak">0</div>
                </div>
            </div>
            <div class="result-actions">
                <button class="btn-retry" id="btnRetry">🔄 再练一次</button>
                <button class="btn-back-menu" id="btnBackMenu">🏠 返回主页</button>
            </div>
        </section>
    </div>

    <!-- 帮助弹窗 -->
    <div class="modal-overlay" id="helpModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📖 游戏规则</h3>
                <button class="modal-close" id="btnCloseHelp">×</button>
            </div>
            <div class="modal-body">
                <ul>
                    <li><span class="help-icon">🧮</span>左侧卡片显示数学题，判断答案是否正确</li>
                    <li><span class="help-icon">🔷</span>右侧卡片显示图形，判断是否为正方形</li>
                    <li><span class="help-icon">🔄</span>两个任务会交替出现</li>
                    <li><span class="help-icon">⚡</span>注意分配注意力到两个任务</li>
                    <li><span class="help-icon">🔥</span>连续答对可获得连击加分</li>
                    <li><span class="help-icon">⌨️</span>键盘：← 左箭头=正确/是，→ 右箭头=错误/不是</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
    (function() {
        'use strict';

        // 游戏状态
        const state = {
            level: 2,
            isPlaying: false,
            timeLeft: 60,
            timerInterval: null,
            
            // 统计数据
            totalQuestions: 0,
            correctCount: 0,
            currentStreak: 0,
            bestStreak: 0,
            
            // 当前任务
            currentTask: 'math',
            currentMath: null,
            currentShape: null,
            awaitingMath: false,
            awaitingShape: false
        };

        // 游戏配置
        const config = {
            1: { questions: 5, time: 30 },
            2: { questions: 10, time: 60 },
            3: { questions: 15, time: 90 }
        };

        // DOM 元素
        const elements = {
            correctCount: document.getElementById('correctCount'),
            streakCount: document.getElementById('streakCount'),
            timeLeft: document.getElementById('timeLeft'),
            progressFill: document.getElementById('progressFill'),
            mathProblem: document.getElementById('mathProblem'),
            shapeDisplay: document.getElementById('shapeDisplay'),
            mathCard: document.getElementById('mathCard'),
            shapeCard: document.getElementById('shapeCard'),
            mathStatus: document.getElementById('mathStatus'),
            shapeStatus: document.getElementById('shapeStatus'),
            mathButtons: document.getElementById('mathButtons'),
            shapeButtons: document.getElementById('shapeButtons'),
            menuScreen: document.getElementById('menuScreen'),
            gameScreen: document.getElementById('gameScreen'),
            resultScreen: document.getElementById('resultScreen'),
            helpModal: document.getElementById('helpModal')
        };

        // 图形列表
        const shapes = [
            { symbol: '⬛', name: '黑色方块', isSquare: true },
            { symbol: '🔺', name: '三角形', isSquare: false },
            { symbol: '🔴', name: '圆形', isSquare: false },
            { symbol: '⬜', name: '白色方块', isSquare: true },
            { symbol: '🔵', name: '蓝色圆形', isSquare: false },
            { symbol: '🟢', name: '绿色圆形', isSquare: false },
            { symbol: '🟡', name: '黄色圆形', isSquare: false },
            { symbol: '🟥', name: '红色方块', isSquare: true },
            { symbol: '🟩', name: '绿色方块', isSquare: true },
            { symbol: '🟦', name: '蓝色方块', isSquare: true }
        ];

        // 初始化
        function init() {
            setupEventListeners();
        }

        // 设置事件监听
        function setupEventListeners() {
            // 难度选择
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    state.level = parseInt(btn.dataset.level);
                });
            });

            // 开始游戏
            document.getElementById('btnStart').addEventListener('click', startGame);
            
            // 返回按钮
            document.getElementById('btnBack').addEventListener('click', goBack);
            
            // 帮助按钮
            document.getElementById('btnHelp').addEventListener('click', showHelp);
            document.getElementById('btnCloseHelp').addEventListener('click', closeHelp);
            elements.helpModal.addEventListener('click', (e) => {
                if (e.target === elements.helpModal) closeHelp();
            });

            // 数学题答案按钮
            document.getElementById('btnMathCorrect').addEventListener('click', () => answerMath(true));
            document.getElementById('btnMathWrong').addEventListener('click', () => answerMath(false));

            // 图形题答案按钮
            document.getElementById('btnShapeYes').addEventListener('click', () => answerShape(true));
            document.getElementById('btnShapeNo').addEventListener('click', () => answerShape(false));

            // 重新开始
            document.getElementById('btnRetry').addEventListener('click', () => {
                showScreen('menu');
            });

            // 返回主页
            document.getElementById('btnBackMenu').addEventListener('click', goBack);

            // 键盘事件
            document.addEventListener('keydown', handleKeyDown);
        }

        // 键盘处理
        function handleKeyDown(e) {
            if (!state.isPlaying) return;

            if (e.key === 'ArrowLeft') {
                if (state.currentTask === 'math') {
                    answerMath(true);
                } else {
                    answerShape(true);
                }
            } else if (e.key === 'ArrowRight') {
                if (state.currentTask === 'math') {
                    answerMath(false);
                } else {
                    answerShape(false);
                }
            }
        }

        // 开始游戏
        function startGame() {
            const gameConfig = config[state.level];
            
            // 重置状态
            state.isPlaying = true;
            state.timeLeft = gameConfig.time;
            state.totalQuestions = 0;
            state.correctCount = 0;
            state.currentStreak = 0;
            state.bestStreak = 0;
            state.currentTask = 'math';

            // 显示游戏界面
            showScreen('game');
            
            // 更新显示
            updateDisplay();
            
            // 开始计时器
            startTimer();
            
            // 显示第一个任务
            showMathTask();
        }

        // 显示屏幕
        function showScreen(screen) {
            elements.menuScreen.classList.remove('active');
            elements.gameScreen.classList.remove('active');
            elements.resultScreen.classList.remove('active');

            switch(screen) {
                case 'menu':
                    elements.menuScreen.classList.add('active');
                    break;
                case 'game':
                    elements.gameScreen.classList.add('active');
                    break;
                case 'result':
                    elements.resultScreen.classList.add('active');
                    break;
            }
        }

        // 开始计时器
        function startTimer() {
            if (state.timerInterval) {
                clearInterval(state.timerInterval);
            }

            state.timerInterval = setInterval(() => {
                state.timeLeft--;
                updateDisplay();

                if (state.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 更新显示
        function updateDisplay() {
            elements.correctCount.textContent = state.correctCount;
            elements.streakCount.textContent = state.currentStreak;
            elements.timeLeft.textContent = state.timeLeft;

            const gameConfig = config[state.level];
            const progress = ((gameConfig.time - state.timeLeft) / gameConfig.time) * 100;
            elements.progressFill.style.width = `${progress}%`;
        }

        // 生成数学问题
        function generateMathProblem() {
            const operators = ['+', '-', '×'];
            const operator = operators[Math.floor(Math.random() * operators.length)];
            
            let num1, num2, correctAnswer;
            
            if (operator === '+') {
                num1 = Math.floor(Math.random() * 50) + 10;
                num2 = Math.floor(Math.random() * 50) + 10;
                correctAnswer = num1 + num2;
            } else if (operator === '-') {
                num1 = Math.floor(Math.random() * 50) + 30;
                num2 = Math.floor(Math.random() * 30) + 10;
                correctAnswer = num1 - num2;
            } else {
                num1 = Math.floor(Math.random() * 12) + 2;
                num2 = Math.floor(Math.random() * 12) + 2;
                correctAnswer = num1 * num2;
            }

            // 生成错误答案
            let wrongAnswer;
            do {
                wrongAnswer = correctAnswer + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 5) + 1);
            } while (wrongAnswer === correctAnswer || wrongAnswer < 0);

            const showCorrect = Math.random() > 0.5;
            const displayAnswer = showCorrect ? correctAnswer : wrongAnswer;

            return {
                expression: `${num1} ${operator} ${num2}`,
                answer: displayAnswer,
                isCorrect: showCorrect
            };
        }

        // 显示数学任务
        function showMathTask() {
            state.currentMath = generateMathProblem();
            elements.mathProblem.textContent = `${state.currentMath.expression} = ${state.currentMath.answer}`;
            
            elements.mathCard.classList.add('current');
            elements.mathStatus.textContent = '请回答！';
            elements.mathStatus.classList.remove('waiting');
            elements.mathStatus.classList.add('active');
            elements.mathButtons.style.display = 'flex';
            
            state.awaitingMath = true;
            state.currentTask = 'math';
        }

        // 显示图形任务
        function showShapeTask() {
            const shape = shapes[Math.floor(Math.random() * shapes.length)];
            state.currentShape = shape;
            
            elements.shapeDisplay.textContent = shape.symbol;
            elements.shapeCard.classList.add('current');
            elements.shapeStatus.textContent = '请回答！';
            elements.shapeStatus.classList.remove('waiting');
            elements.shapeStatus.classList.add('active');
            elements.shapeButtons.style.display = 'flex';
            
            state.awaitingShape = true;
            state.currentTask = 'shape';
        }

        // 回答数学题
        function answerMath(isCorrect) {
            if (!state.awaitingMath) return;
            
            state.awaitingMath = false;
            state.totalQuestions++;

            if (isCorrect === state.currentMath.isCorrect) {
                // 正确
                state.correctCount++;
                state.currentStreak++;
                state.bestStreak = Math.max(state.bestStreak, state.currentStreak);
                elements.mathCard.classList.add('flash-correct');
                elements.mathStatus.textContent = '✓ 正确！';
            } else {
                // 错误
                state.currentStreak = 0;
                elements.mathCard.classList.add('flash-wrong');
                elements.mathStatus.textContent = '✗ 错误';
            }

            elements.mathCard.classList.remove('current');
            elements.mathButtons.style.display = 'none';
            elements.mathStatus.classList.remove('active');
            elements.mathStatus.classList.add('waiting');

            updateDisplay();

            setTimeout(() => {
                elements.mathCard.classList.remove('flash-correct', 'flash-wrong');
                showShapeTask();
            }, 500);
        }

        // 回答图形题
        function answerShape(isYes) {
            if (!state.awaitingShape) return;
            
            state.awaitingShape = false;
            state.totalQuestions++;

            if (isYes === state.currentShape.isSquare) {
                // 正确
                state.correctCount++;
                state.currentStreak++;
                state.bestStreak = Math.max(state.bestStreak, state.currentStreak);
                elements.shapeCard.classList.add('flash-correct');
                elements.shapeStatus.textContent = '✓ 正确！';
            } else {
                // 错误
                state.currentStreak = 0;
                elements.shapeCard.classList.add('flash-wrong');
                elements.shapeStatus.textContent = '✗ 错误';
            }

            elements.shapeCard.classList.remove('current');
            elements.shapeButtons.style.display = 'none';
            elements.shapeStatus.classList.remove('active');
            elements.shapeStatus.classList.add('waiting');

            updateDisplay();

            setTimeout(() => {
                elements.shapeCard.classList.remove('flash-correct', 'flash-wrong');
                showMathTask();
            }, 500);
        }

        // 结束游戏
        function endGame() {
            state.isPlaying = false;
            clearInterval(state.timerInterval);

            // 计算得分
            const accuracy = state.totalQuestions > 0 
                ? Math.round((state.correctCount / state.totalQuestions) * 100) 
                : 0;
            const score = state.correctCount * 10 + state.bestStreak * 5;

            // 保存记录
            saveGameRecord(score, accuracy);

            // 显示结果
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalAccuracy').textContent = `${accuracy}%`;
            document.getElementById('finalCorrect').textContent = state.correctCount;
            document.getElementById('finalStreak').textContent = state.bestStreak;

            showScreen('result');
        }

        // 保存游戏记录
        function saveGameRecord(score, accuracy) {
            try {
                const records = JSON.parse(localStorage.getItem('dualGameRecords') || '[]');
                records.push({
                    date: new Date().toISOString(),
                    level: state.level,
                    score: score,
                    accuracy: accuracy,
                    correctCount: state.correctCount,
                    totalQuestions: state.totalQuestions,
                    bestStreak: state.bestStreak
                });
                
                // 只保留最近20条记录
                if (records.length > 20) {
                    records.splice(0, records.length - 20);
                }
                
                localStorage.setItem('dualGameRecords', JSON.stringify(records));
            } catch (e) {
                console.error('保存记录失败:', e);
            }
        }

        // 返回
        function goBack() {
            if (state.isPlaying) {
                if (confirm('确定要退出训练吗？')) {
                    state.isPlaying = false;
                    clearInterval(state.timerInterval);
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        // 显示帮助
        function showHelp() {
            elements.helpModal.classList.add('active');
        }

        // 关闭帮助
        function closeHelp() {
            elements.helpModal.classList.remove('active');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
