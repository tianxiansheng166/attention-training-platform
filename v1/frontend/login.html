<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 专注力星球</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1>🎯 专注力星球</h1>
            <nav class="main-nav">
                <a href="index.html" class="nav-link">返回首页</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card auth-card">
            <div class="auth-header">
                <h2>欢迎回来！</h2>
                <p>登录你的专注力训练账户</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">邮箱地址</label>
                    <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-large" id="login-btn">
                        <span id="login-text">登录</span>
                        <span id="login-loading" class="hidden">登录中...</span>
                    </button>
                </div>
            </form>

            <div class="auth-footer">
                <p>还没有账户？<a href="register.html" class="link">立即注册</a></p>
            </div>
        </section>

        <div id="error-message" class="alert alert-error hidden"></div>
        <div id="success-message" class="alert alert-success hidden"></div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2024-2026 专注力星球</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('login-form');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const loginBtn = document.getElementById('login-btn');
            const loginText = document.getElementById('login-text');
            const loginLoading = document.getElementById('login-loading');

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.classList.remove('hidden');
                successMessage.classList.add('hidden');
            }

            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.classList.remove('hidden');
                errorMessage.classList.add('hidden');
            }

            function setLoading(isLoading) {
                loginBtn.disabled = isLoading;
                loginText.classList.toggle('hidden', isLoading);
                loginLoading.classList.toggle('hidden', !isLoading);
            }

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    showError('请填写邮箱和密码');
                    return;
                }

                setLoading(true);

                try {
                    const result = await api.auth.login(email, password);
                    
                    if (result.token && result.user) {
                        api.setAuth(result.token, result.user);
                        
                        showSuccess('登录成功！正在跳转...');
                        
                        setTimeout(() => {
                            // 根据角色跳转
                            if (result.user.role === 'parent') {
                                window.location.href = 'parent.html';
                            } else {
                                window.location.href = 'index.html';
                            }
                        }, 1000);
                    }
                } catch (error) {
                    showError(error.message || '登录失败，请检查邮箱和密码');
                } finally {
                    setLoading(false);
                }
            });

            if (api.isLoggedIn()) {
                const user = api.getCurrentUser();
                if (user && user.role === 'parent') {
                    window.location.href = 'parent.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
