<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时空密码 - 专注力星球</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <header class="game-header">
        <div class="container">
            <h1>🧩 时空密码</h1>
            <p class="game-dimension">工作记忆更新训练</p>
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>
    </header>

    <main class="container">
        <!-- 游戏说明 -->
        <section class="card game-instructions">
            <h2>📖 游戏规则</h2>
            <div class="instruction-content">
                <p><strong>🎯 目标：</strong>记住之前出现过的方格位置和颜色</p>
                <p><strong>⌨️ 操作：</strong></p>
                <ul>
                    <li>按 <kbd>←</kbd> 左箭头键：当前方格位置与 <strong>N</strong> 个前一致</li>
                    <li>按 <kbd>→</kbd> 右箭头键：当前方格位置与 <strong>N</strong> 个前<strong>不一致</strong></li>
                    <li>按 <kbd>↑</kbd> 上箭头键：当前颜色与 <strong>N</strong> 个前一致</li>
                    <li>按 <kbd>↓</kbd> 下箭头键：当前颜色与 <strong>N</strong> 个前<strong>不一致</strong></li>
                </ul>
                <p><strong>⚡ 注意：</strong>需要同时判断位置和颜色！</p>
            </div>
            <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
        </section>

        <!-- 游戏界面 -->
        <section id="game-area" class="game-area hidden">
            <button class="pause-button" onclick="togglePause()">⏸️</button>
            <div class="game-stats">
                <div class="stat-item">
                    <span class="stat-label">当前N值</span>
                    <span id="n-value" class="stat-value">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">分数</span>
                    <span id="score" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">连击</span>
                    <span id="combo" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">时间</span>
                    <span id="timer" class="stat-value">5:00</span>
                </div>
            </div>

            <div class="grid-container">
                <div id="game-grid" class="game-grid"></div>
            </div>

            <div id="feedback" class="feedback hidden"></div>

            <div class="game-controls">
                <div class="control-hint">
                    <kbd>←</kbd> 位置一致
                    <kbd>→</kbd> 位置不一致
                    <kbd>↑</kbd> 颜色一致
                    <kbd>↓</kbd> 颜色不一致
                </div>
            </div>
        </section>

        <!-- 结果界面 -->
        <section id="result-area" class="result-area hidden">
            <div class="card result-card">
                <h2>🏆 游戏结束</h2>
                <div class="result-stats">
                    <div class="result-stat">
                        <span class="result-label">最终得分</span>
                        <span id="final-score" class="result-value">0</span>
                    </div>
                    <div class="result-stat">
                        <span class="result-label">最高N值</span>
                        <span id="final-n" class="result-value">1</span>
                    </div>
                    <div class="result-stat">
                        <span class="result-label">最高连击</span>
                        <span id="final-combo" class="result-value">0</span>
                    </div>
                    <div class="result-stat">
                        <span class="result-label">正确率</span>
                        <span id="final-accuracy" class="result-value">0%</span>
                    </div>
                </div>
                <div class="result-actions">
                    <button class="btn btn-primary" onclick="restartGame()">再玩一次</button>
                    <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
                </div>
            </div></section>
        </section>

        <!-- 暂停界面 -->
        <div id="pause-overlay" class="hidden">
            <div class="pause-content">
                <div class="pause-icon">⏸️</div>
                <h2>游戏暂停</h2>
                <div class="pause-buttons">
                    <button class="pause-btn resume" onclick="togglePause()">继续游戏</button>
                    <button class="pause-btn exit" onclick="confirmExit()">退出游戏</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/game-nback.js"></script>
</body>
</html>
