<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能任务工坊 - 专注力星球</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 任务工坊专用样式 */
        .workshop-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .workshop-intro {
            text-align: center;
            margin-bottom: var(--spacing-xl);
            color: white;
        }

        .workshop-intro h2 {
            font-size: var(--text-3xl);
            margin-bottom: var(--spacing-md);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .workshop-intro p {
            font-size: var(--text-lg);
            opacity: 0.9;
        }

        .task-input-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-lg);
            margin-bottom: var(--spacing-xl);
        }

        .task-input-card h3 {
            font-size: var(--text-xl);
            color: var(--text-primary);
            margin-bottom: var(--spacing-md);
        }

        .task-textarea {
            width: 100%;
            min-height: 120px;
            padding: var(--spacing-md);
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-size: var(--text-base);
            font-family: inherit;
            resize: vertical;
            transition: var(--transition);
        }

        .task-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .task-actions {
            margin-top: var(--spacing-lg);
            display: flex;
            gap: var(--spacing-md);
            justify-content: center;
        }

        .task-list {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            box-shadow: var(--shadow-lg);
        }

        .task-list h3 {
            font-size: var(--text-xl);
            color: var(--text-primary);
            margin-bottom: var(--spacing-lg);
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: var(--spacing-md);
            padding: var(--spacing-md);
            border-bottom: 1px solid var(--gray-100);
            transition: var(--transition);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-item:hover {
            background: var(--gray-50);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-content {
            text-decoration: line-through;
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--gray-300);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
            font-size: 14px;
            color: white;
        }

        .task-checkbox:hover {
            border-color: var(--primary);
        }

        .task-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .task-content {
            flex: 1;
        }

        .task-text {
            font-size: var(--text-base);
            color: var(--text-primary);
            margin-bottom: var(--spacing-xs);
        }

        .task-meta {
            display: flex;
            gap: var(--spacing-md);
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .task-encouragement {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-left: 3px solid var(--primary);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: var(--text-sm);
            color: var(--primary);
            margin-top: var(--spacing-xs);
        }

        .loading-state {
            text-align: center;
            padding: var(--spacing-2xl);
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--spacing-lg);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            background: var(--gray-200);
            height: 8px;
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-top: var(--spacing-md);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
        }

        .task-stats {
            display: flex;
            justify-content: space-between;
            margin-top: var(--spacing-md);
            padding-top: var(--spacing-md);
            border-top: 1px solid var(--gray-100);
        }

        .task-stat {
            text-align: center;
        }

        .task-stat-value {
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--primary);
        }

        .task-stat-label {
            font-size: var(--text-sm);
            color: var(--text-muted);
        }

        .ai-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
        }

        .back-home {
            margin-top: var(--spacing-xl);
            text-align: center;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1>🛠️ 智能任务工坊</h1>
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>
    </header>

    <main class="container">
        <div class="workshop-container">
            <div class="workshop-intro">
                <h2>🤖 AI 帮你分解难题</h2>
                <p>把大任务变成小步骤，轻松完成每一天的挑战</p>
            </div>

            <!-- 任务输入 -->
            <div class="task-input-card">
                <h3>📝 输入你的任务</h3>
                <textarea id="task-input" class="task-textarea"
                    placeholder="例如：复习数学第三章，准备期末考试，完成科学报告..."></textarea>
                <div class="task-actions">
                    <button class="btn btn-primary" onclick="decomposeTask()">
                        <span>✨</span> AI 分解任务
                    </button>
                    <button class="btn btn-secondary" onclick="clearTasks()">
                        <span>🗑️</span> 清空
                    </button>
                </div>
            </div>

            <!-- 加载状态 -->
            <div id="loading-state" class="task-list loading-state hidden">
                <div class="loading-spinner"></div>
                <p>AI 正在帮你分解任务...</p>
                <p style="font-size: 0.9rem; color: #666; margin-top: 10px;">这可能需要几秒钟</p>
            </div>

            <!-- 任务列表 -->
            <div id="task-list-container" class="task-list hidden">
                <h3>
                    📋 任务列表
                    <span class="ai-badge">AI 生成</span>
                </h3>
                <div id="task-list"></div>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill" style="width: 0%;"></div>
                </div>
                <div class="task-stats">
                    <div class="task-stat">
                        <div id="completed-count" class="task-stat-value">0</div>
                        <div class="task-stat-label">已完成</div>
                    </div>
                    <div class="task-stat">
                        <div id="total-count" class="task-stat-value">0</div>
                        <div class="task-stat-label">总任务数</div>
                    </div>
                    <div class="task-stat">
                        <div id="completion-rate" class="task-stat-value">0%</div>
                        <div class="task-stat-label">完成率</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2024-2026 专注力星球 - 科学的专注力训练</p>
        </div>
    </footer>

    <script src="js/common.js"></script>
    <script src="js/task-workshop.js"></script>
</body>
</html>
